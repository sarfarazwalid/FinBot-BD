<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 120'>
  <defs>
    <linearGradient id='bg' x1='0' y1='0' x2='1' y2='1'>
      <stop offset='0%' stop-color='#16120E'/>
      <stop offset='100%' stop-color='#221D18'/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width='200' height='120' fill='url(#bg)' rx='12'/>
  
  <!-- FinBot mark -->
  <g transform='translate(20 30)'>
    <path d='M 24 4 L 42 12 L 42 28 Q 42 38 24 44 Q 6 38 6 28 L 6 12 Z' fill='none' stroke='#B87333' stroke-width='2' stroke-linejoin='round' stroke-linecap='round'/>
    <circle cx='24' cy='16' r='2.5' fill='#B87333'/>
    <circle cx='14' cy='28' r='2.5' fill='#B87333'/>
    <circle cx='34' cy='28' r='2.5' fill='#B87333'/>
    <path d='M 24 16 L 14 28' stroke='#B87333' stroke-width='1.5' stroke-linecap='round'/>
    <path d='M 24 16 L 34 28' stroke='#B87333' stroke-width='1.5' stroke-linecap='round'/>
    <path d='M 14 28 L 34 28' stroke='#B87333' stroke-width='1.5' stroke-linecap='round'/>
  </g>
  
  <!-- Plus / Integration indicator -->
  <text x='85' y='55' font-family='Inter, sans-serif' font-size='14' fill='#2E2720'>+</text>
  
  <!-- bKash-style Partner Mark (simplified geometric bird) -->
  <g transform='translate(100 25)'>
    <polygon points='0,0 45,10 70,25 60,45 40,35 20,50 30,30 10,20' fill='#C81E50' opacity='0.9'/>
    <polygon points='45,10 70,25 60,45 40,35' fill='#E8225F' opacity='0.6'/>
    <polygon points='10,20 30,30 20,50 0,40' fill='#9B1742' opacity='0.8'/>
  </g>
  
  <!-- Labels -->
  <text x='26' y='105' font-family='Inter, sans-serif' font-size='10' font-weight='600' fill='#B87333'>FinBot</text>
  <text x='106' y='105' font-family='Inter, sans-serif' font-size='10' font-weight='600' fill='#F0EAE0'>Partner</text>
</svg>
